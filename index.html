<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 Predictor</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#fff;color:#111}
#app{width:100%;min-height:600px}
.hero{background:linear-gradient(135deg,#0A0F1E 0%,#1a2540 50%,#0d1a0d 100%);padding:24px 20px 20px;text-align:center}
.hero-flags{font-size:28px;letter-spacing:8px;margin-bottom:8px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#fff;letter-spacing:3px;line-height:1}
.hero-sub{font-size:11px;color:#C89B3C;letter-spacing:4px;text-transform:uppercase;margin-top:4px}
.hero-hosts{display:flex;justify-content:center;gap:16px;margin-top:12px;flex-wrap:wrap}
.host-badge{background:rgba(255,255,255,0.08);border:1px solid rgba(240,192,64,0.3);border-radius:20px;padding:4px 12px;font-size:12px;color:#fff;display:flex;align-items:center;gap:6px}
.nav{display:flex;background:#f5f5f5;border-bottom:2px solid #e0e0e0;overflow-x:auto}
.nav-btn{flex:1;min-width:80px;padding:10px 8px;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:#666;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap}
.nav-btn.active{color:#D4001B;border-bottom-color:#D4001B;background:#fff}
.nav-btn:hover:not(.active){background:#ebebeb}
.section{display:none;padding:16px}
.section.active{display:block}
.info-box{background:#fff8e1;border-left:4px solid #C89B3C;padding:10px 14px;border-radius:4px;font-size:12px;color:#555;margin-bottom:16px;line-height:1.5}
.june27-banner{background:#1a2540;color:#fff;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;line-height:1.6}
.june27-banner strong{color:#C89B3C}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.group-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;overflow:hidden}
.group-header{background:#0A0F1E;color:#fff;padding:8px 12px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}
.team-row{padding:6px 10px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;font-size:12px}
.team-row:last-child{border-bottom:none}
.team-flag{font-size:18px;width:24px;text-align:center}
.team-name{flex:1;font-weight:500}
.host-star{color:#C89B3C;font-size:10px}
.fixtures-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#0A0F1E;margin:16px 0 10px}
.fixture-card{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:10px 14px;margin-bottom:8px}
.fixture-meta{font-size:10px;color:#999;margin-bottom:6px;display:flex;gap:8px;flex-wrap:wrap}
.fixture-teams{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fixture-team{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;min-width:80px}
.vs-badge{background:#f0f0f0;border-radius:4px;padding:2px 8px;font-size:11px;color:#888;font-weight:600}
.score-inputs{display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap}
.score-inputs label{font-size:11px;color:#888}
.score-input{width:44px;height:32px;border:1.5px solid #ddd;border-radius:6px;text-align:center;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif}
.score-input:focus{outline:none;border-color:#D4001B}
.score-sep{font-size:16px;font-weight:700;color:#ccc}
.predict-btn{margin-left:auto;background:#D4001B;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer}
.predicted-badge{margin-left:auto;background:#e8f5e9;color:#2e7d32;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600}
.standings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:20px}
.standing-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;overflow:hidden}
.standing-header{background:#0A0F1E;color:#fff;padding:8px 12px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px}
.standing-table{width:100%;font-size:11px;border-collapse:collapse}
.standing-table th{background:#f8f8f8;padding:5px 8px;text-align:center;font-weight:600;color:#666;border-bottom:1px solid #eee}
.standing-table th:first-child{text-align:left}
.standing-table td{padding:5px 8px;text-align:center;border-bottom:1px solid #f5f5f5}
.standing-table td:first-child{text-align:left;font-weight:500}
.rank-top2{background:#e8f5e9}
.rank-3q{background:#fff8e1}
.qualify-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-q{background:#4caf50}.dot-3q{background:#ffc107}.dot-out{background:#ddd}
.legend{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#666}
.progress-bar-wrap{background:#f0f0f0;border-radius:10px;height:6px;margin-bottom:4px}
.progress-bar{background:#D4001B;height:6px;border-radius:10px;transition:width 0.4s}
.progress-label{font-size:11px;color:#999;margin-bottom:12px}
.fifa-link{display:inline-flex;align-items:center;gap:6px;background:#0A0F1E;color:#fff;border-radius:6px;padding:6px 14px;font-size:12px;text-decoration:none;margin-bottom:14px}

/* R32 */
.thirds-panel{background:#f8f8f8;border-radius:10px;padding:14px;margin-bottom:20px}
.thirds-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#0A0F1E;margin-bottom:10px}
.thirds-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
.third-chip{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:10px}
.third-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#C89B3C;width:22px;flex-shrink:0}
.third-info{flex:1;min-width:0}
.third-name{font-size:12px;font-weight:600}
.third-stats{font-size:10px;color:#999;margin-top:1px}
.third-assigned{font-size:10px;color:#1976d2;margin-top:2px;font-style:italic}

.r32-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}
.r32-match{background:#fff;border:1.5px solid #e0e0e0;border-radius:12px;padding:14px;transition:border-color 0.2s}
.r32-match.complete{border-color:#4caf50}
.r32-match-id{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;color:#999;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.r32-match-id .badge-fixed{font-size:9px;background:#e8f5e9;color:#2e7d32;border-radius:3px;padding:2px 6px;font-family:'DM Sans',sans-serif;font-weight:600}
.r32-match-id .badge-third{font-size:9px;background:#fff8e1;color:#C89B3C;border-radius:3px;padding:2px 6px;font-family:'DM Sans',sans-serif;font-weight:600}
.r32-team{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:13px;font-weight:500;border:1.5px solid transparent;cursor:pointer;transition:all 0.15s}
.r32-team:hover{background:#f5f5f5}
.r32-team.winner{background:#e8f5e9;border-color:#4caf50}
.r32-team.loser{opacity:0.3}
.r32-vs{text-align:center;font-size:10px;color:#ddd;padding:2px 0}
.r32-pick-hint{font-size:10px;color:#1976d2;margin-top:6px;text-align:center}

/* Draft slot */
.draft-slot{border:1.5px dashed #ddd;border-radius:8px;padding:10px 12px;margin-top:0;cursor:pointer;transition:all 0.15s;background:#fafafa}
.draft-slot:hover{border-color:#C89B3C;background:#fffbf0}
.draft-slot-empty{display:flex;align-items:center;gap:8px}
.draft-slot-empty .slot-icon{font-size:16px;color:#ccc}
.draft-slot-empty .slot-label{font-size:12px;color:#aaa;font-style:italic;flex:1}
.draft-slot-empty .eligible-label{font-size:10px;color:#bbb;background:#f0f0f0;border-radius:4px;padding:2px 6px;white-space:nowrap}
.draft-slot-filled{display:flex;align-items:center;gap:8px}
.draft-slot-filled .slot-flag{font-size:20px;flex-shrink:0}
.draft-slot-filled .slot-name{font-size:13px;font-weight:600;flex:1}
.draft-slot-filled .slot-group{font-size:10px;color:#999}
.draft-slot-clear{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;flex-shrink:0;transition:color 0.15s}
.draft-slot-clear:hover{color:#D4001B}

/* Pick modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:14px;padding:20px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#0A0F1E;margin-bottom:2px}
.modal-sub{font-size:11px;color:#888;margin-bottom:16px;line-height:1.5}
.modal-team-option{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;border:1.5px solid #f0f0f0;margin-bottom:6px;transition:all 0.15s}
.modal-team-option:hover{background:#f5f5f5;border-color:#ddd}
.modal-team-option:last-child{margin-bottom:0}
.modal-team-flag{font-size:24px;flex-shrink:0}
.modal-team-info{flex:1}
.modal-team-name{font-size:13px;font-weight:600}
.modal-team-detail{font-size:10px;color:#999;margin-top:2px}
.modal-empty{text-align:center;padding:20px;color:#aaa;font-size:13px}
.modal-cancel{width:100%;margin-top:12px;padding:10px;border:1.5px solid #eee;border-radius:8px;background:none;cursor:pointer;font-size:13px;color:#888;font-family:'DM Sans',sans-serif}
.modal-cancel:hover{background:#f5f5f5}

/* KO rounds */
.ko-info{background:#e3f2fd;border-left:4px solid #1976d2;padding:10px 14px;border-radius:4px;font-size:12px;color:#555;margin-bottom:16px}
.ko-round-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#0A0F1E;margin:16px 0 10px}
.ko-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
.ko-fixture{background:#fff;border:1.5px solid #e0e0e0;border-radius:12px;padding:12px}
.ko-fixture.has-winner{border-color:#4caf50}
.ko-fixture-meta{font-size:10px;color:#aaa;margin-bottom:6px;display:flex;justify-content:space-between}
.ko-team{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:13px;font-weight:500;border:1.5px solid transparent;cursor:pointer;transition:all 0.15s}
.ko-team:hover{background:#f5f5f5}
.ko-team.winner{background:#e8f5e9;border-color:#4caf50}
.ko-team.loser{opacity:0.3}
.ko-team.tbd{color:#bbb;font-style:italic;cursor:default}
.ko-vs{text-align:center;font-size:10px;color:#ddd;padding:2px 0}
.pick-hint{font-size:10px;color:#1976d2;margin-top:6px;text-align:center}

.awards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:10px}
.award-card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:14px}
.award-icon{font-size:28px;margin-bottom:6px}
.award-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:#0A0F1E;margin-bottom:4px}
.award-desc{font-size:11px;color:#999;margin-bottom:10px}
.award-pick{width:100%;border:1.5px solid #ddd;border-radius:6px;padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:13px;margin-top:4px;display:block}
.award-pick:focus{outline:none;border-color:#C89B3C}
.award-saved{font-size:11px;color:#4caf50;margin-top:6px;display:none}
.save-bar{background:#fff;border-top:1px solid #eee;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;bottom:0}
.save-status{font-size:12px;color:#4caf50;font-weight:500}
.clear-btn{background:none;border:1px solid #ddd;border-radius:6px;padding:6px 12px;font-size:12px;color:#888;cursor:pointer}
</style>
</head>

function calcStandings(){
  const s={};
  Object.keys(GROUPS).forEach(g=>{s[g]={};GROUPS[g].teams.forEach(t=>{s[g][t.n]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});});
  FIXTURES.forEach((f,i)=>{
    const sc=state.scores[i];
    if(sc&&sc.h1!==''&&sc.h2!==''&&sc.h1!==undefined){
      const g=f.g,a=f.h1,b=f.h2,s1=parseInt(sc.h1),s2=parseInt(sc.h2);
      if(!s[g][a]||!s[g][b])return;
      s[g][a].p++;s[g][b].p++;s[g][a].gf+=s1;s[g][a].ga+=s2;s[g][b].gf+=s2;s[g][b].ga+=s1;
      if(s1>s2){s[g][a].w++;s[g][a].pts+=3;s[g][b].l++;}
      else if(s2>s1){s[g][b].w++;s[g][b].pts+=3;s[g][a].l++;}
      else{s[g][a].d++;s[g][a].pts++;s[g][b].d++;s[g][b].pts++;}
    }
  });
  return s;
}

function sortGrp(teams,st){
  return [...teams].sort((a,b)=>{
    const sa=st[a.n],sb=st[b.n];
    if(sb.pts!==sa.pts)return sb.pts-sa.pts;
    const gda=sa.gf-sa.ga,gdb=sb.gf-sb.ga;
    if(gdb!==gda)return gdb-gda;
    return sb.gf-sa.gf;
  });
}

function get3rds(standings){
  const arr=[];
  Object.keys(GROUPS).forEach(g=>{
    const sorted=sortGrp(GROUPS[g].teams,standings[g]);
    if(sorted[2]){const t=sorted[2],st=standings[g][t.n];arr.push({team:t,group:g,pts:st.pts,gd:st.gf-st.ga,gf:st.gf});}
  });
  return arr.sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:b.gd!==a.gd?b.gd-a.gd:b.gf-a.gf);
}

function getQualifiers(){
  const standings=calcStandings();
  const thirds=get3rds(standings);
  const q={};
  Object.keys(GROUPS).forEach(gk=>{
    const sorted=sortGrp(GROUPS[gk].teams,standings[gk]);
    q['W'+gk]=sorted[0]?{n:sorted[0].n,f:sorted[0].f,group:gk}:null;
    q['R'+gk]=sorted[1]?{n:sorted[1].n,f:sorted[1].f,group:gk}:null;
  });
  thirds.slice(0,8).forEach((t,i)=>{q['T'+(i+1)]={n:t.team.n,f:t.team.f,group:t.group,rank:i+1,pts:t.pts,gd:t.gd,gf:t.gf};});
  return q;
}

function resolveFixed(slot,q){
  if(slot.type==='w')return q['W'+slot.g]||null;
  if(slot.type==='ru')return q['R'+slot.g]||null;
  return null;
}

// Get all teams already picked in other third-place slots
function getPickedThirds(excludeMatchId){
  return new Set(Object.entries(state.thirds).filter(([mid])=>mid!==excludeMatchId).map(([,t])=>t.n));
}

// Get available options for a slot: eligible group + not already picked elsewhere
function getOptions(allowed,excludeMatchId,q){
  const picked=getPickedThirds(excludeMatchId);
  const thirds=[];
  for(let i=1;i<=8;i++){if(q['T'+i])thirds.push(q['T'+i]);}
  return thirds.filter(t=>allowed.includes(t.group)&&!picked.has(t.n));
}

  <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>

    if(f.g!==lastG){h+=`<div class="fixtures-title">Group ${f.g}</div>`;lastG=f.g;}
    const sc=state.scores[i]||{};const predicted=sc.h1!==undefined&&sc.h1!=='';

      <div class="fixture-meta"><span>📅 ${f.d}</span><span>🕐 ${f.t}</span><span>📍 ${f.v}</span></div>

        <span class="score-sep">–</span>
        <input class="score-input" type="number" min="0" max="20" value="${sc.h2!==undefined?sc.h2:''}" placeholder="0" id="sc_${i}_h2" onchange="saveScore(${i})">

    </div>`;
  });

  h+=`</div><div style="text-align:center;margin-top:20px">
    <a class="fifa-link" href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/scores-fixtures" target="_blank">🔗 Confirm your bracket on FIFA.com from June 27</a>
  </div>`;

  document.getElementById('tab-r32').innerHTML=h;
}

// Draft pick modal
function openPick(matchId,allowedStr){
  const q=getQualifiers();
  const allowed=allowedStr.split(',');
  const options=getOptions(allowed,matchId,q);

  let modal=`<div class="modal-overlay" id="pickmodal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">Pick 3rd Place Team</div>
    <div class="modal-sub">Only teams from eligible groups are shown.<br>Each team can only be assigned to one match.</div>`;

  if(options.length===0){
    modal+=`<div class="modal-empty">No eligible teams available.<br>All qualifying 3rd place teams from groups ${allowed.join('/')} have already been assigned.</div>`;
  } else {
    options.forEach(t=>{
      modal+=`<div class="modal-team-option" onclick="pickThird('${matchId}','${t.n}','${t.f}','${t.group}')">
        <span class="modal-team-flag">${t.f}</span>
        <div class="modal-team-info">
          <div class="modal-team-name">${t.n}</div>
          <div class="modal-team-detail">Group ${t.group} · Pts: ${t.pts} · GD: ${t.gd>=0?'+':''}${t.gd} · GF: ${t.gf}</div>
        </div>
      </div>`;
    });
  }

  modal+=`<button class="modal-cancel" onclick="closeModal()">Cancel</button></div></div>`;
  document.body.insertAdjacentHTML('beforeend',modal);
}

function pickThird(matchId,name,flag,group){
  state.thirds[matchId]={n:name,f:flag,group};
  // clear ko pick for this match if team changed
  const idx=R32.findIndex(m=>m.id===matchId);
  if(idx>=0)delete state.ko['r32_'+idx];
  save();closeModal();renderR32();
}

function clearThird(matchId,idx){
  delete state.thirds[matchId];
  delete state.ko['r32_'+idx];
  save();renderR32();
}

function closeModal(){const m=document.getElementById('pickmodal');if(m)m.remove();}

function pickKO(mid,idx){
  state.ko[mid]=idx;save();
  if(mid.startsWith('r32'))renderR32();
  else if(mid.startsWith('r16'))renderKORound('r16','Round of 16',R16);
  else if(mid.startsWith('qf'))renderKORound('qf','Quarter-Finals',QF);
  else if(mid.startsWith('sf'))renderKORound('sf','Semi-Finals',SF);
  else if(mid.startsWith('final'))renderFinal();
}

function getR32Winner(idx){
  const match=R32[idx];const q=getQualifiers();
  const mid='r32_'+idx;const picked=state.ko[mid];if(picked===undefined)return null;
  const t1=resolveFixed(match.t1,q);
  const t2=match.isThird?(state.thirds[match.id]||null):resolveFixed(match.t2,q);
  return picked===0?t1:t2;
}

function resolveKO(ref){
  if(ref.r32!==undefined)return getR32Winner(ref.r32);
  if(ref.r16!==undefined){const p=state.ko['r16_'+ref.r16];if(p===undefined)return null;const m=R16[ref.r16];return resolveKO(p===0?m.t1:m.t2);}
  if(ref.qf!==undefined){const p=state.ko['qf_'+ref.qf];if(p===undefined)return null;const m=QF[ref.qf];return resolveKO(p===0?m.t1:m.t2);}
  if(ref.sf!==undefined){const p=state.ko['sf_'+ref.sf];if(p===undefined)return null;const m=SF[ref.sf];return resolveKO(p===0?m.t1:m.t2);}
  return null;
}

function renderKORound(roundId,title,matches){
  let h=`<div class="ko-info">Click a team to pick the winner. They advance to the next round. Both teams stay visible in this bracket.</div>
  <a class="fifa-link" href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/scores-fixtures" target="_blank">🔗 Official FIFA results</a>
  <div class="ko-round-title">${title}</div><div class="ko-grid">`;
  matches.forEach((m,mi)=>{
    const t1=resolveKO(m.t1);const t2=resolveKO(m.t2);
    const mid=roundId+'_'+mi;const picked=state.ko[mid];const t1win=picked===0,t2win=picked===1;
    h+=`<div class="ko-fixture ${picked!==undefined?'has-winner':''}">
      <div class="ko-fixture-meta"><span style="font-weight:600">Match ${mi+1}</span><span>${m.label}</span></div>
      <div class="ko-team ${t1?'':'tbd'} ${picked!==undefined?(t1win?'winner':'loser'):''}" onclick="${t1?`pickKO('${mid}',0)`:''}">
        <span style="font-size:18px">${t1?t1.f:'🏳️'}</span><span>${t1?t1.n:'Complete prior round first'}</span>
        ${t1win?'<span style="margin-left:auto;font-size:10px;color:#4caf50">✓ Winner</span>':''}
      </div>
      <div class="ko-vs">vs</div>
      <div class="ko-team ${t2?'':'tbd'} ${picked!==undefined?(t2win?'winner':'loser'):''}" onclick="${t2?`pickKO('${mid}',1)`:''}">
        <span style="font-size:18px">${t2?t2.f:'🏳️'}</span><span>${t2?t2.n:'Complete prior round first'}</span>
        ${t2win?'<span style="margin-left:auto;font-size:10px;color:#4caf50">✓ Winner</span>':''}
      </div>
      ${picked===undefined&&t1&&t2?'<div class="pick-hint">Tap a team to pick the winner</div>':''}
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('tab-'+roundId).innerHTML=h;
}

function renderFinal(){
  const t1=resolveKO({sf:0});const t2=resolveKO({sf:1});
  const picked=state.ko['final_0'];const winner=picked===0?t1:picked===1?t2:null;
  let h=`<div style="text-align:center;padding:20px 10px">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:#0A0F1E">🏆 The Final</div>
    <div style="font-size:13px;color:#999;margin-bottom:24px">MetLife Stadium · East Rutherford, New Jersey · July 19, 2026</div>`;
  if(t1&&t2){
    h+=`<div style="display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:24px">
      <div onclick="pickKO('final_0',0)" style="cursor:pointer;border:2px solid ${picked===0?'#4caf50':'#e0e0e0'};border-radius:12px;padding:20px 28px;text-align:center;background:${picked===0?'#e8f5e9':'#fff'};min-width:130px">
        <div style="font-size:44px">${t1.f}</div><div style="font-size:15px;font-weight:600;margin-top:8px">${t1.n}</div>
        ${picked===0?'<div style="color:#4caf50;font-size:12px;margin-top:6px">🏆 Champion</div>':''}
      </div>
      <div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:#ccc">VS</div>
      <div onclick="pickKO('final_0',1)" style="cursor:pointer;border:2px solid ${picked===1?'#4caf50':'#e0e0e0'};border-radius:12px;padding:20px 28px;text-align:center;background:${picked===1?'#e8f5e9':'#fff'};min-width:130px">
        <div style="font-size:44px">${t2.f}</div><div style="font-size:15px;font-weight:600;margin-top:8px">${t2.n}</div>
        ${picked===1?'<div style="color:#4caf50;font-size:12px;margin-top:6px">🏆 Champion</div>':''}
      </div>
    </div>`;
    if(picked===undefined)h+=`<div style="font-size:13px;color:#1976d2">Click a team to pick your World Cup Champion</div>`;
  } else {
    h+=`<div style="font-size:13px;color:#aaa;margin:40px 0">Complete the Semi-Finals to reveal your finalists</div>`;
  }
  if(winner){
    h+=`<div style="background:linear-gradient(135deg,#0A0F1E,#1a2540);border-radius:16px;padding:28px;color:#fff;margin-top:24px;display:inline-block;min-width:280px">
      <div style="font-size:11px;letter-spacing:3px;color:#C89B3C;text-transform:uppercase;margin-bottom:10px">Your 2026 World Cup Champion</div>
      <div style="font-size:52px">${winner.f}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;margin-top:6px">${winner.n}</div>
    </div>`;
  }
  h+=`</div>`;
  document.getElementById('tab-final').innerHTML=h;
}

function renderAwards(){
  const awards=[
    {id:'boot',icon:'⚽',name:'Golden Boot',desc:'Top scorer of the tournament'},
    {id:'glove',icon:'🧤',name:'Golden Glove',desc:'Best goalkeeper'},
    {id:'ball',icon:'🏆',name:'Golden Ball',desc:'Player of the tournament'},
    {id:'young',icon:'🌟',name:'Best Young Player',desc:'Best player aged 21 or under'}
  ];
  let h=`<div class="info-box">Your top 3 picks for each award. Be bold — back your instinct.</div><div class="awards-grid">`;
  awards.forEach(a=>{
    const sv=state.awards[a.id]||{p1:'',p2:'',p3:''};
    h+=`<div class="award-card"><div class="award-icon">${a.icon}</div><div class="award-name">${a.name}</div><div class="award-desc">${a.desc}</div>
      <input class="award-pick" placeholder="1st pick" value="${sv.p1}" oninput="saveAward('${a.id}','p1',this.value)">
      <input class="award-pick" placeholder="2nd pick" value="${sv.p2}" oninput="saveAward('${a.id}','p2',this.value)">
      <input class="award-pick" placeholder="3rd pick" value="${sv.p3}" oninput="saveAward('${a.id}','p3',this.value)">
      <div class="award-saved" id="asvd-${a.id}">✓ Saved</div></div>`;
  });
  h+=`</div>`;
  document.getElementById('tab-awards').innerHTML=h;
}

function saveAward(id,field,val){
  if(!state.awards[id])state.awards[id]={p1:'',p2:'',p3:''};
  state.awards[id][field]=val;save();
  const el=document.getElementById('asvd-'+id);
  if(el){el.style.display='block';setTimeout(()=>el.style.display='none',1800);}
}

renderGroups();renderFixtures();renderStandings();renderR32();
renderKORound('r16','Round of 16',R16);
renderKORound('qf','Quarter-Finals',QF);
renderKORound('sf','Semi-Finals',SF);
renderFinal();renderAwards();
</script>
</body>
